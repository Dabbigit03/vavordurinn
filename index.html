<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Counter</title>
<style>
  :root {
    --deep: #0b3d5c;
    --mid: #1c7ea6;
    --bright: #3fb8e0;
    --pale: #eaf7fc;
    --paper: #ffffff;
    --ink: #0d2733;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(180deg, var(--pale) 0%, #d6eef7 100%);
    color: var(--ink);
    padding: 24px;
  }

  .card {
    background: var(--paper);
    border-radius: 24px;
    padding: 36px 32px 28px;
    width: 100%;
    max-width: 360px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(11, 61, 92, 0.15);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: "";
    position: absolute;
    top: -60px;
    right: -60px;
    width: 160px;
    height: 160px;
    background: radial-gradient(circle, var(--bright) 0%, transparent 70%);
    opacity: 0.35;
  }

  .header-row {
    position: relative;
    z-index: 4;
  }

  .settings-btn {
    position: absolute;
    top: -8px;
    right: -8px;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: none;
    background: var(--pale);
    color: var(--mid);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s ease, background 0.15s ease;
    z-index: 5;
  }

  .settings-btn:hover {
    background: #dcebf2;
  }

  .settings-btn:active {
    transform: scale(0.92);
  }

  .settings-btn svg {
    width: 18px;
    height: 18px;
  }

  h1 {
    font-size: 15px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--mid);
    margin: 0 0 4px;
    font-weight: 700;
  }

  .date {
    font-size: 13px;
    color: #6b8fa3;
    margin-bottom: 28px;
  }

  .drop-wrap {
    position: relative;
    width: 140px;
    height: 140px;
    margin: 0 auto 18px;
  }

  .drop-bg, .drop-fg {
    position: absolute;
    inset: 0;
  }

  .drop-bg svg path {
    transition: fill 0.3s ease;
  }

  .drop-wrap.pulse .drop-bg {
    animation: dropPulse 0.5s ease;
  }

  @keyframes dropPulse {
    0% { transform: scale(1); }
    30% { transform: scale(1.12); }
    60% { transform: scale(0.97); }
    100% { transform: scale(1); }
  }

  .ripple {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--bright);
    opacity: 0.55;
    transform: translate(-50%, -50%) scale(0);
    pointer-events: none;
    animation: rippleOut 0.7s ease-out forwards;
  }

  @keyframes rippleOut {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 0.55; }
    100% { transform: translate(-50%, -50%) scale(9); opacity: 0; }
  }

  .float-plus {
    position: absolute;
    left: 50%;
    top: 30%;
    transform: translate(-50%, 0);
    font-weight: 800;
    font-size: 18px;
    color: var(--mid);
    pointer-events: none;
    animation: floatUp 0.9s ease-out forwards;
    z-index: 5;
  }

  @keyframes floatUp {
    0% { opacity: 0; transform: translate(-50%, 10px) scale(0.8); }
    20% { opacity: 1; transform: translate(-50%, -4px) scale(1.05); }
    100% { opacity: 0; transform: translate(-50%, -46px) scale(1); }
  }

  .count {
    font-size: 44px;
    font-weight: 800;
    color: var(--deep);
    line-height: 1;
    position: relative;
    z-index: 2;
    margin-top: 38px;
    display: inline-block;
  }

  .count.bump {
    animation: countBump 0.4s ease;
  }

  @keyframes countBump {
    0% { transform: scale(1); }
    40% { transform: scale(1.22); color: var(--bright); }
    100% { transform: scale(1); }
  }

  .label {
    font-size: 13px;
    color: var(--mid);
    font-weight: 600;
    position: relative;
    z-index: 2;
    margin-top: 4px;
    letter-spacing: 0.04em;
  }

  .size-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .size-btn {
    flex: 1;
    border: 2px solid var(--pale);
    background: var(--pale);
    color: var(--mid);
    border-radius: 12px;
    padding: 10px 6px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s ease;
    line-height: 1.3;
  }

  .size-btn .size-ml {
    display: block;
    font-size: 14px;
  }

  .size-btn.active {
    background: linear-gradient(135deg, var(--mid), var(--bright));
    border-color: var(--mid);
    color: white;
    box-shadow: 0 6px 14px rgba(63, 184, 224, 0.35);
  }

  .size-btn.tapped,
  .custom-add-btn.tapped {
    animation: sizeTap 0.35s ease;
  }

  @keyframes sizeTap {
    0% { transform: scale(1); }
    40% { transform: scale(0.9); }
    100% { transform: scale(1); }
  }

  .custom-row {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
  }

  .custom-row input {
    flex: 1;
    min-width: 0;
    border: 2px solid var(--pale);
    background: var(--pale);
    border-radius: 12px;
    padding: 10px 6px;
    font-size: 13px;
    color: var(--deep);
    font-weight: 700;
    text-align: center;
  }

  .custom-row input:focus {
    outline: none;
    border-color: var(--bright);
  }

  .custom-row input::placeholder {
    color: #8fb3c4;
    font-weight: 600;
  }

  /* Hide native number spinner arrows so the field stays compact */
  .custom-row input::-webkit-outer-spin-button,
  .custom-row input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .custom-row input[type="number"] {
    -moz-appearance: textfield;
  }

  .custom-add-btn {
    flex: 1;
    border: none;
    border-radius: 12px;
    padding: 10px 6px;
    font-size: 12px;
    font-weight: 700;
    color: white;
    background: linear-gradient(135deg, var(--mid), var(--bright));
    cursor: pointer;
    transition: transform 0.1s ease;
  }

  .custom-add-btn:active {
    transform: scale(0.95);
  }

  .goal-display {
    font-size: 13px;
    color: #6b8fa3;
    margin-bottom: 22px;
  }

  .goal-display strong {
    color: var(--deep);
    font-weight: 700;
  }

  .progress-track {
    width: 100%;
    height: 8px;
    background: #e1f1f8;
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 26px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--mid), var(--bright));
    width: 0%;
    transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .history {
    margin-top: 24px;
    text-align: left;
  }

  .history-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--mid);
    margin-bottom: 10px;
  }

  .history-list {
    list-style: none;
    margin: 0;
    padding: 0;
    max-height: 200px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .history-empty {
    font-size: 12px;
    color: #9db8c6;
    padding: 8px 2px;
  }

  .history-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--pale);
    border-radius: 10px;
    padding: 8px 10px;
    font-size: 13px;
    color: var(--deep);
    animation: historyIn 0.25s ease;
  }

  @keyframes historyIn {
    0% { opacity: 0; transform: translateY(-6px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .history-item.removing {
    animation: historyOut 0.25s ease forwards;
  }

  @keyframes historyOut {
    0% { opacity: 1; transform: translateX(0); max-height: 40px; }
    100% { opacity: 0; transform: translateX(12px); max-height: 0; padding-top: 0; padding-bottom: 0; margin: 0; }
  }

  .history-left {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .history-amount {
    font-weight: 700;
  }

  .history-time {
    font-size: 11px;
    color: #6b8fa3;
  }

  .history-delete {
    border: none;
    background: transparent;
    color: #6b8fa3;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    padding: 2px 6px;
    line-height: 1;
    border-radius: 6px;
    transition: background 0.15s ease, color 0.15s ease;
  }

  .history-delete:hover {
    background: #dcebf2;
    color: var(--deep);
  }

  .reset-note {
    margin-top: 18px;
    font-size: 11px;
    color: #9db8c6;
  }

  .status {
    font-size: 11px;
    color: #9db8c6;
    margin-top: 6px;
    min-height: 14px;
  }

  .sync-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #9db8c6;
    margin-right: 5px;
    vertical-align: middle;
  }

  .sync-dot.online { background: #3fb8e0; }

  /* --- Settings modal --- */

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(11, 61, 92, 0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
    padding: 20px;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }

  .modal-box {
    background: var(--paper);
    border-radius: 20px;
    padding: 26px 22px;
    width: 100%;
    max-width: 340px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(11, 61, 92, 0.35);
    text-align: left;
    transform: translateY(10px);
    transition: transform 0.2s ease;
  }

  .modal-overlay.open .modal-box {
    transform: translateY(0);
  }

  .modal-title {
    font-size: 16px;
    font-weight: 800;
    color: var(--deep);
    margin-bottom: 4px;
    text-align: center;
  }

  .modal-subtitle {
    font-size: 12px;
    color: #6b8fa3;
    text-align: center;
    margin-bottom: 18px;
  }

  .modal-section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--mid);
    margin: 0 0 10px;
  }

  .settings-size-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    align-items: center;
  }

  .settings-size-row input[type="number"] {
    width: 70px;
    flex: 0 0 70px;
    border: 2px solid var(--pale);
    background: var(--pale);
    border-radius: 10px;
    padding: 8px 6px;
    font-size: 13px;
    font-weight: 700;
    color: var(--deep);
    text-align: center;
  }

  .settings-size-row input[type="text"] {
    flex: 1;
    min-width: 0;
    border: 2px solid var(--pale);
    background: var(--pale);
    border-radius: 10px;
    padding: 8px 10px;
    font-size: 13px;
    font-weight: 600;
    color: var(--deep);
  }

  .settings-size-row input:focus {
    outline: none;
    border-color: var(--bright);
  }

  .settings-goal-row {
    margin-top: 20px;
    margin-bottom: 6px;
  }

  .settings-goal-row label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--mid);
    margin-bottom: 8px;
  }

  .settings-goal-row input {
    width: 100%;
    border: 2px solid var(--pale);
    background: var(--pale);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
    font-weight: 700;
    color: var(--deep);
    text-align: center;
  }

  .settings-goal-row input:focus {
    outline: none;
    border-color: var(--bright);
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 22px;
  }

  .modal-btn {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: none;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s ease;
  }

  .modal-btn:active {
    transform: scale(0.96);
  }

  .modal-btn.save {
    background: linear-gradient(135deg, var(--mid), var(--bright));
    color: white;
  }

  .modal-btn.cancel {
    background: var(--pale);
    color: var(--mid);
  }
</style>
</head>
<body>

<div class="card">
  <div class="header-row">
    <h1>Va vörðurinn</h1>
    <button class="settings-btn" id="settingsBtn" aria-label="Stillingar">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 15.5C13.933 15.5 15.5 13.933 15.5 12C15.5 10.067 13.933 8.5 12 8.5C10.067 8.5 8.5 10.067 8.5 12C8.5 13.933 10.067 15.5 12 15.5Z" stroke="currentColor" stroke-width="1.6"/>
        <path d="M19.4 13.5C19.47 13.01 19.5 12.51 19.5 12C19.5 11.49 19.47 10.99 19.4 10.5L21.32 9.02C21.5 8.88 21.55 8.63 21.43 8.43L19.63 5.32C19.51 5.12 19.27 5.04 19.06 5.12L16.82 6.01C16.36 5.65 15.86 5.35 15.32 5.13L14.98 2.75C14.95 2.53 14.76 2.37 14.54 2.37H9.46C9.24 2.37 9.05 2.53 9.02 2.75L8.68 5.13C8.14 5.35 7.64 5.66 7.18 6.01L4.94 5.12C4.73 5.04 4.49 5.12 4.37 5.32L2.57 8.43C2.45 8.63 2.5 8.88 2.68 9.02L4.6 10.5C4.53 10.99 4.5 11.5 4.5 12C4.5 12.5 4.53 13.01 4.6 13.5L2.68 14.98C2.5 15.12 2.45 15.37 2.57 15.57L4.37 18.68C4.49 18.88 4.73 18.96 4.94 18.88L7.18 17.99C7.64 18.35 8.14 18.65 8.68 18.87L9.02 21.25C9.05 21.47 9.24 21.63 9.46 21.63H14.54C14.76 21.63 14.95 21.47 14.98 21.25L15.32 18.87C15.86 18.65 16.36 18.34 16.82 17.99L19.06 18.88C19.27 18.96 19.51 18.88 19.63 18.68L21.43 15.57C21.55 15.37 21.5 15.12 21.32 14.98L19.4 13.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
  <div class="date" id="dateLabel">--</div>

  <div class="drop-wrap" id="dropWrap">
    <svg class="drop-bg" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
      <path d="M70 12 C70 12 30 62 30 92 C30 114.7 47.9 132 70 132 C92.1 132 110 114.7 110 92 C110 62 70 12 70 12 Z"
            fill="#eaf7fc" stroke="#bfe4f2" stroke-width="2"/>
    </svg>
    <div class="count" id="countDisplay">0</div>
    <div class="label">ml í dag</div>
  </div>

  <div class="size-row" id="sizeRow"></div>

  <div class="custom-row">
    <input type="number" id="customInput" min="1" step="1" placeholder="t.d. 250" />
    <button class="custom-add-btn" id="customAddBtn">+ Bæta við</button>
  </div>

  <div class="goal-display">Daglegt markmið: <strong id="goalDisplay">2000</strong> ml</div>

  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="reset-note">Endurstillist daglega klukkan 00:00</div>
  <div class="status" id="statusLine"><span class="sync-dot" id="syncDot"></span><span id="statusText">Tengist...</span></div>

  <div class="history">
    <div class="history-title">Skráningar í dag</div>
    <ul class="history-list" id="historyList"></ul>
  </div>
</div>

<div class="modal-overlay" id="settingsOverlay">
  <div class="modal-box">
    <div class="modal-title">Stillingar</div>
    <div class="modal-subtitle">Sérsniðnir skammtar og markmið</div>

    <div class="modal-section-title">Skammtar (allt að 3)</div>
    <div class="settings-size-row">
      <input type="number" id="sizeMl0" min="1" placeholder="ml" />
      <input type="text" id="sizeName0" placeholder="Heiti (t.d. Fla)" />
    </div>
    <div class="settings-size-row">
      <input type="number" id="sizeMl1" min="1" placeholder="ml" />
      <input type="text" id="sizeName1" placeholder="Heiti (t.d. Fla)" />
    </div>
    <div class="settings-size-row">
      <input type="number" id="sizeMl2" min="1" placeholder="ml" />
      <input type="text" id="sizeName2" placeholder="Heiti (t.d. Glas)" />
    </div>

    <div class="settings-goal-row">
      <label for="settingsGoalInput">Daglegt markmið (ml)</label>
      <input type="number" id="settingsGoalInput" min="50" step="50" />
    </div>

    <div class="modal-actions">
      <button class="modal-btn cancel" id="settingsCancelBtn">Hætta við</button>
      <button class="modal-btn save" id="settingsSaveBtn">Vista</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBZA7legVCOZvbAsCPmE5szRaJwjResd58",
    authDomain: "vavordur.firebaseapp.com",
    projectId: "vavordur",
    storageBucket: "vavordur.firebasestorage.app",
    messagingSenderId: "591299517852",
    appId: "1:591299517852:web:5f3202681a44017edabc59"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const stateDocRef = doc(db, "waterCounter", "sharedState");

  const countDisplay = document.getElementById('countDisplay');
  const progressFill = document.getElementById('progressFill');
  const dateLabel = document.getElementById('dateLabel');
  const goalDisplay = document.getElementById('goalDisplay');
  const statusText = document.getElementById('statusText');
  const syncDot = document.getElementById('syncDot');
  const dropWrap = document.getElementById('dropWrap');
  const customInput = document.getElementById('customInput');
  const customAddBtn = document.getElementById('customAddBtn');
  const historyList = document.getElementById('historyList');
  const sizeRow = document.getElementById('sizeRow');

  const settingsBtn = document.getElementById('settingsBtn');
  const settingsOverlay = document.getElementById('settingsOverlay');
  const settingsCancelBtn = document.getElementById('settingsCancelBtn');
  const settingsSaveBtn = document.getElementById('settingsSaveBtn');
  const settingsGoalInput = document.getElementById('settingsGoalInput');
  const sizeInputs = [
    { ml: document.getElementById('sizeMl0'), name: document.getElementById('sizeName0') },
    { ml: document.getElementById('sizeMl1'), name: document.getElementById('sizeName1') },
    { ml: document.getElementById('sizeMl2'), name: document.getElementById('sizeName2') }
  ];

  const DEFAULT_SIZES = [
    { ml: 750, name: 'Fla' },
    { ml: 500, name: 'Fla' },
    { ml: 330, name: 'Glas' }
  ];

  let state = { date: null, totalMl: 0, goalMl: 2000, selectedSize: 500, history: [], sizes: DEFAULT_SIZES };
  let initialized = false;
  let sizeButtonEls = [];

  function timeLabel(timestamp) {
    const d = new Date(timestamp);
    const hh = String(d.getHours()).padStart(2, '0');
    const mm = String(d.getMinutes()).padStart(2, '0');
    return hh + ':' + mm;
  }

  function highlightSize() {
    sizeButtonEls.forEach((btn) => {
      btn.classList.toggle('active', Number(btn.dataset.ml) === state.selectedSize);
    });
  }

  function todayKey() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  const ICELANDIC_WEEKDAYS = ['sunnudagur', 'mánudagur', 'þriðjudagur', 'miðvikudagur', 'fimmtudagur', 'föstudagur', 'laugardagur'];
  const ICELANDIC_MONTHS = ['janúar', 'febrúar', 'mars', 'apríl', 'maí', 'júní', 'júlí', 'ágúst', 'september', 'október', 'nóvember', 'desember'];

  function formatDisplayDate() {
    const d = new Date();
    const weekday = ICELANDIC_WEEKDAYS[d.getDay()];
    const month = ICELANDIC_MONTHS[d.getMonth()];
    const day = d.getDate();
    const capitalizedWeekday = weekday.charAt(0).toUpperCase() + weekday.slice(1);
    return capitalizedWeekday + ' ' + day + '. ' + month;
  }

  function renderSizeButtons() {
    sizeRow.innerHTML = '';
    sizeButtonEls = [];
    const sizes = Array.isArray(state.sizes) && state.sizes.length > 0 ? state.sizes : DEFAULT_SIZES;
    sizes.slice(0, 3).forEach((size) => {
      if (!size || !size.ml || size.ml <= 0) return;
      const btn = document.createElement('button');
      btn.className = 'size-btn';
      btn.dataset.ml = size.ml;

      const mlSpan = document.createElement('span');
      mlSpan.className = 'size-ml';
      mlSpan.textContent = size.ml + ' ml';
      btn.appendChild(mlSpan);
      btn.appendChild(document.createTextNode(size.name || 'Ílát'));

      btn.addEventListener('click', () => {
        checkForNewDay();
        state.selectedSize = size.ml;
        state.totalMl += size.ml;
        logHistoryEntry(size.ml);
        render();
        save();
        playAddAnimation(size.ml, btn);
      });

      sizeRow.appendChild(btn);
      sizeButtonEls.push(btn);
    });
  }

  function renderHistory() {
    historyList.innerHTML = '';
    if (!state.history || state.history.length === 0) {
      const empty = document.createElement('li');
      empty.className = 'history-empty';
      empty.textContent = 'Engar skráningar ennþá';
      historyList.appendChild(empty);
      return;
    }
    const ordered = state.history.slice().sort((a, b) => b.timestamp - a.timestamp);
    ordered.forEach((entry) => {
      const li = document.createElement('li');
      li.className = 'history-item';
      li.dataset.id = entry.id;

      const left = document.createElement('div');
      left.className = 'history-left';

      const amount = document.createElement('span');
      amount.className = 'history-amount';
      amount.textContent = '+' + entry.amountMl + ' ml';

      const time = document.createElement('span');
      time.className = 'history-time';
      time.textContent = timeLabel(entry.timestamp);

      left.appendChild(amount);
      left.appendChild(time);

      const delBtn = document.createElement('button');
      delBtn.className = 'history-delete';
      delBtn.setAttribute('aria-label', 'Eyða skráningu');
      delBtn.textContent = '×';
      delBtn.addEventListener('click', () => deleteHistoryEntry(entry.id));

      li.appendChild(left);
      li.appendChild(delBtn);
      historyList.appendChild(li);
    });
  }

  function deleteHistoryEntry(id) {
    const entry = state.history.find((h) => h.id === id);
    if (!entry) return;
    const li = historyList.querySelector('[data-id="' + id + '"]');
    const finish = () => {
      state.history = state.history.filter((h) => h.id !== id);
      state.totalMl = Math.max(0, state.totalMl - entry.amountMl);
      render();
      save();
    };
    if (li) {
      li.classList.add('removing');
      li.addEventListener('animationend', finish, { once: true });
    } else {
      finish();
    }
  }

  function render() {
    countDisplay.textContent = state.totalMl;
    dateLabel.textContent = formatDisplayDate();
    goalDisplay.textContent = state.goalMl;
    const pct = state.goalMl > 0 ? Math.min(100, (state.totalMl / state.goalMl) * 100) : 0;
    progressFill.style.width = pct + '%';
    renderSizeButtons();
    highlightSize();
    renderHistory();
  }

  function playAddAnimation(amountMl, sourceButton) {
    dropWrap.classList.remove('pulse');
    void dropWrap.offsetWidth;
    dropWrap.classList.add('pulse');

    countDisplay.classList.remove('bump');
    void countDisplay.offsetWidth;
    countDisplay.classList.add('bump');

    const ripple = document.createElement('div');
    ripple.className = 'ripple';
    dropWrap.appendChild(ripple);
    ripple.addEventListener('animationend', () => ripple.remove());

    const floatEl = document.createElement('div');
    floatEl.className = 'float-plus';
    floatEl.textContent = '+' + amountMl + ' ml';
    dropWrap.appendChild(floatEl);
    floatEl.addEventListener('animationend', () => floatEl.remove());

    if (sourceButton) {
      sourceButton.classList.remove('tapped');
      void sourceButton.offsetWidth;
      sourceButton.classList.add('tapped');
    }
  }

  function logHistoryEntry(amountMl) {
    if (!Array.isArray(state.history)) state.history = [];
    state.history.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
      amountMl: amountMl,
      timestamp: Date.now()
    });
  }

  function setStatus(text, online) {
    statusText.textContent = text;
    syncDot.classList.toggle('online', !!online);
  }

  async function save() {
    try {
      await setDoc(stateDocRef, state);
      setStatus('Samstillt', true);
    } catch (e) {
      setStatus('Ekki tókst að vista — athugaðu nettengingu', false);
    }
  }

  function applyRemoteState(data) {
    state.date = data.date || null;
    state.totalMl = typeof data.totalMl === 'number' ? data.totalMl : 0;
    state.goalMl = typeof data.goalMl === 'number' ? data.goalMl : 2000;
    state.selectedSize = typeof data.selectedSize === 'number' ? data.selectedSize : 500;
    state.history = Array.isArray(data.history) ? data.history : [];
    state.sizes = Array.isArray(data.sizes) && data.sizes.length > 0 ? data.sizes : DEFAULT_SIZES;
  }

  function checkForNewDay() {
    const key = todayKey();
    if (state.date !== key) {
      state.date = key;
      state.totalMl = 0;
      state.history = [];
      render();
      save();
    }
  }

  onSnapshot(stateDocRef, (snapshot) => {
    if (snapshot.exists()) {
      applyRemoteState(snapshot.data());
    }
    if (!initialized) {
      initialized = true;
      checkForNewDay();
      render();
      if (!snapshot.exists()) {
        save();
      } else {
        setStatus('Samstillt', true);
      }
    } else {
      render();
      setStatus('Samstillt', true);
    }
  }, (error) => {
    setStatus('Ótengt — athugaðu nettengingu', false);
  });

  function addCustomAmount() {
    const val = parseInt(customInput.value, 10);
    if (!val || val <= 0) {
      customInput.focus();
      return;
    }
    checkForNewDay();
    state.totalMl += val;
    logHistoryEntry(val);
    render();
    save();
    playAddAnimation(val, customAddBtn);
    customInput.value = '';
  }

  customAddBtn.addEventListener('click', addCustomAmount);

  customInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      addCustomAmount();
    }
  });

  // --- Settings modal ---

  function openSettings() {
    const sizes = Array.isArray(state.sizes) && state.sizes.length > 0 ? state.sizes : DEFAULT_SIZES;
    sizeInputs.forEach((inputs, i) => {
      const size = sizes[i];
      inputs.ml.value = size ? size.ml : '';
      inputs.name.value = size ? (size.name || '') : '';
    });
    settingsGoalInput.value = state.goalMl;
    settingsOverlay.classList.add('open');
  }

  function closeSettings() {
    settingsOverlay.classList.remove('open');
  }

  settingsBtn.addEventListener('click', openSettings);
  settingsCancelBtn.addEventListener('click', closeSettings);

  settingsOverlay.addEventListener('click', (e) => {
    if (e.target === settingsOverlay) closeSettings();
  });

  settingsSaveBtn.addEventListener('click', () => {
    const newSizes = sizeInputs
      .map((inputs) => {
        const ml = parseInt(inputs.ml.value, 10);
        const name = inputs.name.value.trim();
        if (!ml || ml <= 0) return null;
        return { ml: ml, name: name || 'Ílát' };
      })
      .filter(Boolean);

    state.sizes = newSizes.length > 0 ? newSizes : DEFAULT_SIZES;

    const goalVal = parseInt(settingsGoalInput.value, 10);
    state.goalMl = (!isNaN(goalVal) && goalVal > 0) ? goalVal : state.goalMl;

    render();
    save();
    closeSettings();
  });

  setInterval(checkForNewDay, 30 * 1000);
</script>

</body>
</html>
